<!doctype html>
<html lang = "en">
<head>
<meta charset = "UTF-8">
             <meta name = "viewport"
                   content = "width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
                         <meta http-equiv = "X-UA-Compatible" content = "ie=edge">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel = "stylesheet" type = "text/css" href = "../css/style.css">
             <title>HandCrafts</title>
</head>
<body>

<header class="container">
    <div class="row align-items-sm-center">
        <h2 class="col-sm-4 fw-bold">Group 66</h2>
        <nav class="row col-sm-8">
            <p class="col-sm-2 offset-sm-6">Newest</p>
            <p class="col-sm-2">Catalogue</p>
            <p class="col-sm-2">Contact</p>
        </nav>
    </div>
</header>

<section class="container-fluid jumbotron text-center d-flex flex-column justify-content-center align-items-center">
    <h1>HandCrafts</h1>
    <h2>This year best</h2>
    <a class="btn btn-primary" href="#">See all</a>
</section>

<section class="container text-center">
    <div class="row">
        <figure class="col-sm-6">
            <h3>Kitchen</h3>
            <img class ="w-100" src="../images/kitchen.jpg" alt="kitchen">
        </figure>
         <figure class="col-sm-6">
            <h3>Woodwork</h3>
            <img class ="w-100" src="../images/woodwork.jpg" alt="woodwork">
        </figure>
         <figure class="col-sm-6">
            <h3>Gifts</h3>
            <img class ="w-100" src="../images/gifts.jpg" alt="gifts">
        </figure>
        <figure class="col-sm-6">
            <h3>Antique</h3>
            <img class ="w-100" src="../images/antique.jpg" alt="antique">
        </figure>
    </div>
</section>

<footer >
    <div class="row">
        <h4 class="col-sm-4">&copy; Group 66</h4>
        <ul class="row col-sm-8 list-unstyled">
            <li class="col-sm-1 offset-sm-9"><img src="../images/twitter.svg" alt="Twitter"></li>
            <li class="col-sm-1"><img src="../images/facebook.svg" alt="Facebook"></li>
            <li class="col-sm-1"><img src="../images/instagram.svg" alt="Instagram"></li>
        </ul>
    </div>
</footer>


</body>
</html>
