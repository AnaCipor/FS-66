<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Olympic Rings</title>
  <style>
    .rings {
        text-align: center;
        margin-top: 70px;
    }
    .row {
        margin: 0 0 20px
    }
    .ring-symbol {
        font-size: 120px;
        margin: 0 10px;
    }
    .blue {
        color: blue;
    }
    .black {
        color: black;
    }
    .red {
        color: red;
    }
    .yellow {
        color: yellow;
    }
    .green {
        color: green;
    }
  </style>
</head>
<body>
<div class="rings">
  <div class="row">
    <span class="ring-symbol blue">⌾</span>
    <span class="ring-symbol black">⌾</span>
    <span class="ring-symbol red">⌾</span>
  </div>
  <div class="row>

  <span class="ring-symbol yellow">⌾</span>
  <span class="ring-symbol green">⌾</span>
  </div>

</div>

</body>
</html>
